name: Terraform Plan on PR

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  get_changed_components:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get all components that have changed
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: true
          path: components
          matrix: true

      - name: List all changed files
        run: echo ${{ steps.changed-files.outputs.all_changed_files }}

  terraform_plan:
    name: Terraform plan
    runs-on: ubuntu-22.04
    needs: [get_changed_components]
    strategy:
      matrix:
        modules: ${{ fromJSON(needs.get_changed_components.outputs.matrix) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test
        run: |
          echo ${{ matrix.modules }}
          ls components/${{ matrix.modules }}
