name: Deploy Terraform Component
run-name: Running Terraform ${{ inputs.doapply && 'apply' || 'plan' }} on Component ${{ inputs.component }} to Environment ${{ inputs.environment }}

concurrency:
  group: ${{ inputs.component }}-${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      component:
        description: Terraform Component to Deploy
        type: choice
        required: true
        options:
          - core
      environment:
        description: Environment to deploy into
        type: choice
        required: true
        default: acedev
        options:
          - acedev
      doapply:
        description: Check to enable Apply
        type: boolean
        required: true
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  runTerraform:
    name: Run Terraform
    runs-on: ubuntu-22.04
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.0.0
        with:
          terraform_wrapper: false
          terraform_version: 1.7.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::302653724645:role/DeploymentExecution
          role-session-name: DeploymentExecution
          role-duration-seconds: 3600

      - name: Check creds
        run: aws s3 ls

