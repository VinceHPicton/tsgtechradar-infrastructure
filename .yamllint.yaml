---

# https://yamllint.readthedocs.io/en/stable/rules.html

extends: default
rules:
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
  document-end: disable
  document-start: disable
  indentation:
    spaces: 2
  line-length: disable
  new-lines:
    type: unix
  quoted-strings:
    quote-type: double
    required: only-when-needed
  truthy:
    allowed-values:
      - "true"
      - "false"
      - "on"
